on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2
        id: setup-pandoc
        continue-on-error: true
        with:
          pandoc-version: '3.8.2.1'

      - name: Install pandoc fallback on Linux
        if: steps.setup-pandoc.outcome != 'success' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install pandoc fallback on macOS
        if: steps.setup-pandoc.outcome != 'success' && runner.os == 'macOS'
        run: brew install pandoc

      - name: Install pandoc fallback on Windows
        if: steps.setup-pandoc.outcome != 'success' && runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pandoc -y --no-progress
          "$env:ProgramFiles\Pandoc" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify pandoc
        run: pandoc --version

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build and deploy site
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          Rscript -e 'pkgdown::deploy_to_branch(new_process = FALSE)'
