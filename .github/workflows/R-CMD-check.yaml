on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: ubuntu-latest, r: 'oldrel-1'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2
        id: setup_pandoc
        continue-on-error: true
        with:
          pandoc-version: '3.8.2.1'

      - name: Install pandoc fallback on Linux
        if: steps.setup_pandoc.outcome != 'success' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install pandoc fallback on macOS
        if: steps.setup_pandoc.outcome != 'success' && runner.os == 'macOS'
        run: brew install pandoc

      - name: Install pandoc fallback on Windows
        if: steps.setup_pandoc.outcome != 'success' && runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pandoc -y --no-progress
          "$env:ProgramFiles\Pandoc" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify pandoc
        run: pandoc --version

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          install-r: ${{ runner.os != 'Windows' }}
          use-public-rspm: true

      - name: Verify R
        run: Rscript -e 'cat(R.version.string, "\n")'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
