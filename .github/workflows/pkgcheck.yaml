on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: pkgcheck

jobs:
  pkgcheck:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2
        id: setup_pandoc
        continue-on-error: true
        with:
          pandoc-version: '3.8.2.1'

      - name: Install pandoc fallback on Linux
        if: steps.setup_pandoc.outcome != 'success' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Verify pandoc
        run: pandoc --version

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ropensci-review-tools/pkgcheck
          needs: check

      - name: Run pkgcheck
        run: Rscript -e 'checks <- pkgcheck::pkgcheck("."); print(checks)'
